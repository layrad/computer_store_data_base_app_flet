name: Автоматическая сборка релизов DNS 2 (APK и EXE)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: Сборка Windows приложения
        run: |
          flet build windows src

      - name: Упаковка Windows сборки в ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath build/dns2-windows-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip-artifact
          path: build/dns2-windows-app.zip

  build-android:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: Сборка Android APK
        run: |
          flet build apk src

      - name: Переименование APK
        run: |
          mv build/apk/app-release.apk build/dns2-android-app.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-artifact
          path: build/dns2-android-app.apk

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-zip-artifact

      - uses: actions/download-artifact@v4
        with:
          name: android-apk-artifact

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dns2-windows-app.zip
            dns2-android-app.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
